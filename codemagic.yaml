workflows:
  android-development:
    name: AstroMind Android Standalone Debug (Workable)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      groups:
        - zegocloud_keys
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Create .env file
        script: |
          echo "EXPO_PUBLIC_API_URL=http://10.22.133.139:8000/api" > .env
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --no-install
      - name: Build Android Debug APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

  android-release:
    name: AstroMind Android Release (APK)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      groups:
        - zegocloud_keys
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Create .env file
        script: |
          echo "EXPO_PUBLIC_API_URL=http://10.22.133.139:8000/api" > .env
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform android --no-install
      - name: Build Android Release APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
